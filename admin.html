<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link rel="stylesheet"
      href="css/style.css">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

<div class="container">

<a class="navbar-brand"
   href="index.html">

CVR Admin

</a>

</div>

</nav>

<div class="container my-5">

<h1 class="text-center mb-5">

Admin Dashboard

</h1>

<!-- Statistics Cards -->

<div class="row g-4">

<div class="col-md-3">

<div class="card text-center">

<div class="card-body">

<h2 id="eventCounter">0</h2>
<p>Total Events</p>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card text-center">

<div class="card-body">

<h2>850</h2>

<p>Registrations</p>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card text-center">

<div class="card-body">

<h2>120</h2>

<p>Volunteers</p>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card text-center">

<div class="card-body">

<h2>8</h2>

<p>Clubs</p>

</div>

</div>

</div>

</div>

<!-- Table -->

<div class="card mt-5">

<div class="card-header">

Event Records

</div>

<div class="card-body">

<div class="table-responsive">

<table class="table table-striped">

<thead>

<tr>

<th>Event</th>
<th>Date</th>
<th>Participants</th>
<th>Status</th>

</tr>

</thead>

<tbody>

<tr>

<td>Hackathon</td>

<td>20 June</td>

<td>250</td>

<td>
<span class="badge bg-success">
Active
</span>
</td>

</tr>

<tr>

<td>Cultural Fest</td>

<td>25 June</td>

<td>400</td>

<td>
<span class="badge bg-warning text-dark">
Upcoming
</span>
</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

<!-- Progress Bars -->

<div class="card mt-4">

<div class="card-body">

<h5>
Registration Progress
</h5>

<div class="progress mt-3">

<div class="progress-bar bg-success"
     style="width:80%">

80%

</div>

</div>

</div>

</div>

</div>

<footer class="bg-dark text-white text-center p-4 mt-5">

© 2026 CVR Admin Dashboard

</footer>
<script src="js/script.js"></script>
</body>
</html>
