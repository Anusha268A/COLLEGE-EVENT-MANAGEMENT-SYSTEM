
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

    <div class="container">

        <a class="navbar-brand fw-bold"
           href="index.html">
            CVR Events
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link"
                       href="index.html">
                        Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="events.html">
                        Events
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link active"
                       href="register.html">
                        Register
                    </a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- ================= HEADER ================= -->

<div class="container text-center my-5">

    <h1 class="display-5 fw-bold">
        Event Registration Form
    </h1>

    <p class="lead">
        Register for CVR technical, cultural and club events.
    </p>

</div>

<!-- ================= ALERT ================= -->

<div class="container">

    <div class="alert alert-info">

        Please fill all details correctly before submitting.

    </div>

</div>

<!-- ================= FORM ================= -->

<div class="container mb-5">

    <div class="card shadow">

        <div class="card-body">

            <form onsubmit="registerSuccess(); return false;">

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Full Name
                        </label>

                        <input type="text"
                               class="form-control"
                               required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Roll Number
                        </label>

                        <input type="text"
                               class="form-control"
                               required>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Email
                        </label>

                        <input type="email"
                               class="form-control"
                               required>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Mobile Number
                        </label>

                        <input type="tel"
                               class="form-control"
                               required>

                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Branch
                        </label>

                        <select class="form-select">

                            <option>CSE</option>
                            <option>ECE</option>
                            <option>EEE</option>
                            <option>IT</option>
                            <option>Mechanical</option>

                        </select>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label">
                            Year
                        </label>

                        <select class="form-select">

                            <option>1st Year</option>
                            <option>2nd Year</option>
                            <option>3rd Year</option>
                            <option>4th Year</option>

                        </select>

                    </div>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Select Event / Club
                    </label>

                    <select class="form-select">

                        <option>Hackathon 2026</option>
                        <option>Technical Symposium</option>
                        <option>AI Workshop</option>
                        <option>Coding Competition</option>
                        <option>Cultural Fest</option>
                        <option>Art Club</option>
                        <option>Theatre Club</option>
                        <option>Book Reading Club</option>

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Why do you want to participate?
                    </label>

                    <textarea class="form-control"
                              rows="4"></textarea>

                </div>

                <div class="form-check mb-4">

                    <input class="form-check-input"
                           type="checkbox"
                           required>

                    <label class="form-check-label">

                        I agree to the terms and conditions.

                    </label>

                </div>

                <button type="submit"
                        class="btn btn-success btn-lg">

                    Submit Registration

                </button>

            </form>

        </div>

    </div>

</div>

<!-- ================= FOOTER ================= -->
